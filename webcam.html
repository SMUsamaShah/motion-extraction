<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Motion Extraction — Camera</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
                 font: 13px system-ui, -apple-system, sans-serif; color: #eee; }
    #out { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; background: #000; }
    #out.mirror { transform: scaleX(-1); }

    /* controls pinned to the bottom, safe-area aware for phones */
    #bar { position: fixed; left: 0; right: 0; bottom: 0; display: flex; gap: 14px;
           align-items: center; flex-wrap: wrap;
           padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
           background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
    #bar label { display: flex; flex-direction: column; gap: 3px; font-size: 11px; opacity: .85; }
    #bar .wide { flex: 1 1 110px; }
    input[type=range] { width: 100%; }
    select, button { font-size: 14px; padding: 7px 10px; background: #222; color: #eee;
                     border: 1px solid #444; border-radius: 7px; }
    #start { position: fixed; inset: 0; display: grid; place-items: center; background: #000; }
    #start button { font-size: 18px; padding: 14px 26px; }
    .rgb { display: none; }
    body.is-rgb .rgb { display: flex; }
    body.is-rgb .single { display: none; }
  </style>
</head>
<body>
  <canvas id="out"></canvas>
  <video id="cam" playsinline autoplay muted hidden></video>

  <div id="start"><button id="go">Start camera</button></div>

  <div id="bar" hidden>
    <label>Mode<select id="mode"></select></label>
    <label class="wide single">Delay <span id="delayVal"></span><input type="range" id="delay" min="0" max="2" step="0.01"></label>
    <label class="wide rgb">Red <input type="range" id="delayR" min="0" max="2" step="0.01"></label>
    <label class="wide rgb">Green <input type="range" id="delayG" min="0" max="2" step="0.01"></label>
    <label class="wide rgb">Blue <input type="range" id="delayB" min="0" max="2" step="0.01"></label>
    <label class="wide">Saturation <span id="satVal"></span><input type="range" id="sat" min="0" max="3" step="0.05"></label>
    <label class="wide">Blur <span id="blurVal"></span><input type="range" id="blur" min="0" max="20" step="1"></label>
    <button id="flip">Flip</button>
  </div>

  <script src="motionEffect.js"></script>
  <script src="webcam.js"></script>
</body>
</html>
