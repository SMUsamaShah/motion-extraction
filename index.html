<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Motion Extraction — test bench</title>
  <style>
    body { font: 14px system-ui, sans-serif; margin: 16px; background: #111; color: #eee; }
    h1 { font-size: 18px; }
    .controls { margin: 12px 0; }
    .controls label { margin-right: 16px; white-space: nowrap; }
    #stage { position: relative; display: inline-block; max-width: 95vw; }
    #stage video, #stage canvas { display: block; max-width: 95vw; }
    #out { position: absolute; left: 0; top: 0; }
    a { color: #6cf; }
  </style>
</head>
<body>
  <h1>Motion Extraction — test bench</h1>
  <p>A no-extension sandbox for trying modes/settings. Load a local file (always
     works) or a CORS-enabled video URL.</p>

  <div class="controls">
    <input type="file" id="file" accept="video/*">
    <input type="text" id="url" placeholder="…or a CORS-enabled video URL" size="36">
    <button id="load">Load</button>
  </div>

  <div class="controls">
    <label>Mode <select id="mode"></select></label>
    <label>Delay <input type="range" id="delay" min="0" max="6" step="0.01" value="0.1"> <span id="delayVal">0.10 s</span></label>
    <label>Strength <input type="range" id="strength" min="0" max="1" step="0.01" value="0.5"> <span id="strengthVal">0.50</span></label>
    <label><input type="checkbox" id="freeze"> freeze duplicate</label>
  </div>

  <div class="controls" id="rgbControls" style="display:none">
    <label>Red <input type="range" id="delayR" min="0" max="6" step="0.01" value="0"> <span id="delayRVal">0.00 s</span></label>
    <label>Green <input type="range" id="delayG" min="0" max="6" step="0.01" value="0.1"> <span id="delayGVal">0.10 s</span></label>
    <label>Blue <input type="range" id="delayB" min="0" max="6" step="0.01" value="0.2"> <span id="delayBVal">0.20 s</span></label>
  </div>

  <div class="controls">
    <label>Blur <input type="range" id="blur" min="0" max="20" step="1" value="0"> <span id="blurVal">0 px</span></label>
    <label>Tint <input type="range" id="tint" min="0" max="360" step="1" value="0"> <span id="tintVal">off</span></label>
    <label><input type="checkbox" id="showSource"> show source</label>
  </div>

  <div id="stage">
    <video id="src" loop muted playsinline controls crossorigin="anonymous"></video>
    <canvas id="out"></canvas>
  </div>

  <script src="motionEffect.js"></script>
  <script src="script.js"></script>
</body>
</html>
