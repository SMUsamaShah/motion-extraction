<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font: 13px system-ui, -apple-system, sans-serif; width: 250px; margin: 0; padding: 12px; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    .row { margin: 11px 0; }
    label { display: block; margin-bottom: 4px; color: #333; }
    .val { float: right; color: #888; font-variant-numeric: tabular-nums; }
    input[type=range], select { width: 100%; box-sizing: border-box; }
    .check { display: flex; align-items: center; gap: 6px; }
    .check input { width: auto; }
    .check label { display: inline; margin: 0; }
    button { width: 100%; padding: 8px; font-size: 14px; cursor: pointer; border-radius: 4px; border: 1px solid #bbb; }
    button.on { background: #c0392b; border-color: #c0392b; color: #fff; }
    #hint { min-height: 16px; margin-top: 10px; color: #c0392b; font-size: 12px; }
    hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
  </style>
</head>
<body>
  <h1>Motion Extraction</h1>
  <button id="toggle">Start</button>

  <div class="row">
    <label>Mode</label>
    <select id="mode"></select>
  </div>

  <div class="row no-rgb">
    <label>Delay <span class="val" id="delayVal"></span></label>
    <input type="range" id="delay" min="0" max="5" step="0.01">
  </div>

  <div class="rgb-only" style="display:none">
    <div class="row">
      <label>Red delay <span class="val" id="delayRVal"></span></label>
      <input type="range" id="delayR" min="0" max="5" step="0.01">
    </div>
    <div class="row">
      <label>Green delay <span class="val" id="delayGVal"></span></label>
      <input type="range" id="delayG" min="0" max="5" step="0.01">
    </div>
    <div class="row">
      <label>Blue delay <span class="val" id="delayBVal"></span></label>
      <input type="range" id="delayB" min="0" max="5" step="0.01">
    </div>
  </div>

  <div class="row overlay-only">
    <label>Strength <span class="val" id="strengthVal"></span></label>
    <input type="range" id="strength" min="0" max="1" step="0.01">
  </div>

  <div class="row check no-rgb">
    <input type="checkbox" id="freeze">
    <label for="freeze">Freeze duplicate (change over time)</label>
  </div>

  <hr>

  <div class="row">
    <label>Reveal original <span class="val" id="revealVal"></span></label>
    <input type="range" id="reveal" min="0" max="1" step="0.01">
  </div>

  <div class="row">
    <label>Saturation <span class="val" id="satVal"></span></label>
    <input type="range" id="sat" min="0" max="3" step="0.05">
  </div>

  <div class="row">
    <label>Blur <span class="val" id="blurVal"></span></label>
    <input type="range" id="blur" min="0" max="20" step="1">
  </div>

  <div class="row">
    <label>Tint <span class="val" id="tintVal"></span></label>
    <input type="range" id="tint" min="0" max="360" step="1">
  </div>

  <div id="hint"></div>

  <script src="popup.js"></script>
</body>
</html>
